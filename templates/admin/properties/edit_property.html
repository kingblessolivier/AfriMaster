{% extends 'admin/admin_base/admin_base.html' %}

{% block topbar_title %}Edit Property{% endblock %}
{% block breadcrumb %}<a href="{% url 'admin_dashboard' %}">Home</a> / <a href="{% url 'admin_properties' %}">Properties</a> / Edit{% endblock %}

{% block content %}
<div class="m3-card" style="max-width:900px;margin:0 auto">
    <div class="m3-card-header" style="background:var(--md-sys-color-primary);border:none">
        <h5 style="color:#fff;margin:0"><span class="material-symbols-outlined" style="color:#fff">edit</span> Edit Property</h5>
    </div>
    <div class="m3-card-body" style="padding:32px">
        <form id="editPropertyForm" method="POST" action="/edit_property/{{ property.id }}" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="propertyId" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">tag</span> Property ID</label>
                <input type="text" class="form-control" id="propertyId" name="property_id" readonly value="{{ property.id }}" style="background:var(--md-sys-color-surface-container)">
            </div>
            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="propertyName" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">home</span> Name</label>
                    <input type="text" class="form-control" id="propertyName" name="name" value="{{ property.name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="propertyAddress" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">location_on</span> Address</label>
                    <input type="text" class="form-control" id="propertyAddress" name="address" value="{{ property.address }}" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="propertyType" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">apartment</span> Type</label>
                    <select class="form-select" id="propertyType" name="type" required>
                        <option value="" disabled>Select type</option>
                        <option value="Apartment" {% if property.type == "Apartment" %}selected{% endif %}>Apartment</option>
                        <option value="House" {% if property.type == "House" %}selected{% endif %}>House</option>
                        <option value="Commercial" {% if property.type == "Commercial" %}selected{% endif %}>Commercial</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="propertyPrice" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">payments</span> Price</label>
                    <input type="number" class="form-control" id="propertyPrice" name="price" value="{{ property.price }}" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="propertyDescription" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">description</span> Description</label>
                <textarea class="form-control" id="propertyDescription" rows="3" name="description" required>{{ property.description }}</textarea>
            </div>
            <div class="mb-3">
                <label for="propertyImage" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">image</span> Property Image</label>
                <input type="file" class="form-control" id="propertyImage" name="image">
                {% if property.image %}
                <img src="{{ property.image.url }}" alt="Current" class="img-thumbnail mt-2" style="max-width:120px;border-radius:var(--md-sys-shape-corner-large)">
                {% endif %}
            </div>
            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="propertyOwner" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">person</span> Owner</label>
                    <select class="form-select" id="propertyOwner" name="owner_id" required>
                        <option value="" disabled>Select owner</option>
                        {% for owner in owner_list %}
                        <option value="{{ owner.id }}" {% if owner.id == property.owner.id %}selected{% endif %}>{{ owner.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="propertyUnits" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">grid_view</span> Units</label>
                    <input type="number" class="form-control" id="propertyUnits" name="number_of_units" value="{{ property.number_of_units }}" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="propertyStatus" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">flag</span> Status</label>
                <select class="form-select" id="propertyStatus" name="status" required>
                    <option value="" disabled>Select status</option>
                    <option value="Available" {% if property.status == "Available" %}selected{% endif %}>Available</option>
                    <option value="Rented" {% if property.status == "Rented" %}selected{% endif %}>Rented</option>
                </select>
            </div>
            <div class="d-flex justify-content-center gap-2">
                <a href="{% url 'admin_properties' %}" class="m3-btn-outlined"><span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> Go Back</a>
                <button type="submit" class="m3-btn-filled"><span class="material-symbols-outlined" style="font-size:18px">save</span> Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
