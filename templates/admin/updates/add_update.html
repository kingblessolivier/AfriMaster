{% extends 'admin/admin_base/admin_base.html' %}

{% block topbar_title %}Add Update{% endblock %}
{% block breadcrumb %}<a href="{% url 'admin_dashboard' %}">Home</a> / <a href="{% url 'admin_updates' %}">Updates</a> / Add{% endblock %}

{% block content %}
<div class="m3-card" style="max-width:700px;margin:0 auto">
    <div class="m3-card-header" style="background:var(--md-sys-color-primary);border:none">
        <h5 style="color:#fff;margin:0"><span class="material-symbols-outlined" style="color:#fff">add</span> Add Update</h5>
    </div>
    <div class="m3-card-body" style="padding:32px">
        <form id="addUpdateForm" method="POST" action="{% url 'add_update' %}" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="updateTitle" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">title</span> Title</label>
                    <input type="text" class="form-control" id="updateTitle" placeholder="e.g., System Maintenance" name="title" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="updateDescription" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">description</span> Description</label>
                    <textarea class="form-control" id="updateDescription" placeholder="Description..." name="description" required rows="3"></textarea>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="updateCreatedAt" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">calendar_today</span> Created At</label>
                    <input type="date" class="form-control" id="updateCreatedAt" name="created_at" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="updateEndDate" class="form-label"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">event</span> End Date</label>
                    <input type="date" class="form-control" id="updateEndDate" name="end_date" required>
                </div>
            </div>
            <div class="d-flex justify-content-center gap-2 mt-3">
                <a href="{% url 'admin_updates' %}" class="m3-btn-outlined"><span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> Go Back</a>
                <button type="submit" class="m3-btn-filled"><span class="material-symbols-outlined" style="font-size:18px">save</span> Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
