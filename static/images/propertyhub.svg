<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F5E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="36" ry="36" fill="url(#bgGrad)"/>
  <!-- House/Building icon -->
  <!-- Roof -->
  <polygon points="100,38 148,78 52,78" fill="url(#roofGrad)" opacity="0.95"/>
  <!-- Building body -->
  <rect x="60" y="78" width="80" height="72" rx="4" fill="url(#roofGrad)" opacity="0.95"/>
  <!-- Door -->
  <rect x="88" y="112" width="24" height="38" rx="12" fill="#1B5E20" opacity="0.85"/>
  <!-- Windows -->
  <rect x="68" y="86" width="18" height="16" rx="3" fill="#1B5E20" opacity="0.5"/>
  <rect x="114" y="86" width="18" height="16" rx="3" fill="#1B5E20" opacity="0.5"/>
  <!-- Hub circle accent -->
  <circle cx="100" cy="125" r="4" fill="#A5D6A7"/>
  <!-- "PH" text below building -->
  <text x="100" y="172" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="22" fill="#FFFFFF" letter-spacing="3">PH</text>
</svg>
